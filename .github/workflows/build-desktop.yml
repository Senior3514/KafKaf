name: Build desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: kafkaf-desktop-linux
          - os: windows-latest
            artifact: kafkaf-desktop-windows
          - os: macos-latest
            artifact: kafkaf-desktop-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system webview dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.1 libgirepository1.0-dev

      - name: Install KafKaf + desktop deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[desktop]"
          pip install pyinstaller

      - name: Build executable
        run: python scripts/build_desktop.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/kafkaf-desktop
            dist/kafkaf-desktop.exe
          if-no-files-found: ignore
