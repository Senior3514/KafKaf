# Base stack: Ollama + the KafKaf backend, with no public port publishing.
# This file alone is not meant to be run by itself — combine it with either
# docker-compose.local.yml (publish the backend on the host, the default) or
# docker-compose.tailscale.yml (reachable only over your private tailnet, no
# public exposure at all). install.py picks the right combination for you.
services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"  # loopback only — Ollama is an internal dependency, not a product surface
    restart: unless-stopped
    # A safety net against a runaway/leaking process eating the whole VPS,
    # not a tight cap — generous enough for the default qwen3:4b tier. Bump
    # this if you switch to the qwen3:14b upgrade tier (docs/SETUP.md
    # #choosing-your-model) or you'll get OOM-killed instead of just slow.
    mem_limit: ${KAFKAF_OLLAMA_MEM_LIMIT:-8g}

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    mem_limit: ${KAFKAF_BACKEND_MEM_LIMIT:-2g}
    environment:
      KAFKAF_OLLAMA_HOST: http://ollama:11434
      KAFKAF_OLLAMA_MODEL: ${KAFKAF_OLLAMA_MODEL:-qwen3:4b}
      # observe (chat only) / assisted (skills, no autopilot) / autonomous
      # (skills + autopilot by default) — see docs/SETUP.md#autonomy-levels.
      KAFKAF_AUTONOMY_LEVEL: ${KAFKAF_AUTONOMY_LEVEL:-autonomous}
      KAFKAF_DB_PATH: /data/kafkaf.db
      # Without this, the default checkpoint path is relative and lands in
      # the container's ephemeral working dir, not the mounted volume below
      # — trained weights would be silently lost on every restart.
      KAFKAF_OWN_MODEL_CHECKPOINT_PATH: /data/kafkaf-own-model.pt
    volumes:
      - backend-data:/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama-data:
  backend-data:
