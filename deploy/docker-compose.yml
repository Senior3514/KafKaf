services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      KAFKAF_OLLAMA_HOST: http://ollama:11434
      KAFKAF_OLLAMA_MODEL: ${KAFKAF_OLLAMA_MODEL:-qwen2.5:3b}
      KAFKAF_DB_PATH: /data/kafkaf.db
    volumes:
      - backend-data:/data
    ports:
      - "8420:8420"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama-data:
  backend-data:
