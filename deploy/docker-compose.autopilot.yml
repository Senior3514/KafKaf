# Optional overlay: runs kafkaf-autopilot continuously on the VPS, teaching
# and training KafKaf's own model unattended. Combine with the base file and
# either access-layer overlay:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml -f docker-compose.autopilot.yml up -d --build
# Tune pacing via env vars (see docs/GUIDE.md) — defaults are deliberately
# conservative, not "as fast as possible": KAFKAF_AUTOPILOT_TEACHER (comma-
# separated to rotate multiple models), KAFKAF_AUTOPILOT_INTERVAL_SECONDS,
# KAFKAF_AUTOPILOT_TRAIN_EVERY, KAFKAF_AUTOPILOT_TRAIN_STEPS,
# KAFKAF_AUTOPILOT_DYNAMIC_CURRICULUM (set to "1" to let the teacher propose
# new topics once the starting list is exhausted).
services:
  autopilot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        EXTRAS: "[train]"  # autopilot needs torch to run training steps; the backend image doesn't
    environment:
      KAFKAF_OLLAMA_HOST: http://ollama:11434
      KAFKAF_OLLAMA_MODEL: ${KAFKAF_OLLAMA_MODEL:-qwen3:4b}
      KAFKAF_DB_PATH: /data/kafkaf.db
      # Shares the backend's checkpoint/corpus — autopilot's growth is what
      # chat_with_own_model (API/MCP) actually talks to.
      KAFKAF_OWN_MODEL_CHECKPOINT_PATH: /data/kafkaf-own-model.pt
      AUTOPILOT_TEACHER: ${KAFKAF_AUTOPILOT_TEACHER:-ollama:qwen3:4b}
      AUTOPILOT_INTERVAL_SECONDS: ${KAFKAF_AUTOPILOT_INTERVAL_SECONDS:-300}
      AUTOPILOT_TRAIN_EVERY: ${KAFKAF_AUTOPILOT_TRAIN_EVERY:-5}
      AUTOPILOT_TRAIN_STEPS: ${KAFKAF_AUTOPILOT_TRAIN_STEPS:-100}
      AUTOPILOT_DYNAMIC_CURRICULUM: ${KAFKAF_AUTOPILOT_DYNAMIC_CURRICULUM:-}
      # On the shared /data volume — persists across restarts (a stop stays
      # stopped until explicitly resumed) and is reachable via `docker
      # compose exec autopilot kafkaf-autopilot-ctl stop` for a real
      # emergency stop, without needing to touch the container's own
      # ephemeral filesystem.
      AUTOPILOT_STOP_FILE: /data/autopilot.stop
    volumes:
      - backend-data:/data
    depends_on:
      - ollama
    restart: unless-stopped
    # A shell wrapper so AUTOPILOT_DYNAMIC_CURRICULUM can conditionally add a
    # flag ($${VAR:+word} is real shell parameter expansion, evaluated inside
    # the container at runtime — the doubled $$ stops Compose's own
    # interpolation from touching it at "docker compose config" time).
    command:
      - sh
      - -c
      - >
        kafkaf-autopilot
        --teacher "$$AUTOPILOT_TEACHER"
        --interval-seconds "$$AUTOPILOT_INTERVAL_SECONDS"
        --train-every "$$AUTOPILOT_TRAIN_EVERY"
        --train-steps "$$AUTOPILOT_TRAIN_STEPS"
        --stop-file "$$AUTOPILOT_STOP_FILE"
        $${AUTOPILOT_DYNAMIC_CURRICULUM:+--dynamic-curriculum}
