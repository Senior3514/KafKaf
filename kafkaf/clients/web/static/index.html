<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>KafKaf</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#2f6fed" />
  <link rel="icon" href="/static/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KafKaf" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 100 100" width="30" height="30" aria-hidden="true">
        <path class="logo-sole" d="M50 8 C68 8 79 23 77 41 C75 60 69 92 50 92 C31 92 25 60 23 41 C21 23 32 8 50 8 Z" />
        <path class="logo-strap" d="M50 25 Q37 33 29 46 M50 25 Q63 33 71 46" />
        <circle class="logo-strap-post" cx="50" cy="25" r="4.5" />
      </svg>
      <span class="brand-name">KafKaf</span>
    </div>
    <div class="model-controls" role="group" data-i18n-aria="settings_group">
      <select id="persona-select" class="brain-select" data-i18n-aria="persona_aria" data-i18n-title="persona_title">
        <option value="default" data-i18n="persona_default">Kaf (ברירת מחדל)</option>
        <option value="researcher">Researcher</option>
        <option value="coach">Coach</option>
      </select>
      <select id="brain-select" class="brain-select" data-i18n-aria="brain_aria" data-i18n-title="brain_title">
        <option value="" data-i18n="brain_default">מודל ברירת מחדל (Ollama)</option>
        <option value="own" data-i18n="brain_own">המודל שלנו (גדל עם הזמן)</option>
      </select>
      <label class="council-toggle" data-i18n-title="council_title">
        <input type="checkbox" id="council-toggle" />
        <span data-i18n="council_label">מועצת מוחות</span>
      </label>
      <label class="council-toggle" data-i18n-title="skills_title">
        <input type="checkbox" id="skills-toggle" />
        <span data-i18n="skills_label">סקילים</span>
      </label>
      <button type="button" id="theme-toggle" class="icon-btn" data-i18n-aria="theme_aria">
        <span id="theme-icon" aria-hidden="true">🌓</span>
      </button>
      <button type="button" id="lang-toggle" class="icon-btn lang-btn">EN</button>
      <button type="button" id="control-toggle" class="icon-btn" data-i18n-aria="control_aria" data-i18n-title="control_title_tip">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="5" y1="4" x2="5" y2="20" />
          <circle cx="5" cy="9" r="2" fill="currentColor" stroke="none" />
          <line x1="12" y1="4" x2="12" y2="20" />
          <circle cx="12" cy="15" r="2" fill="currentColor" stroke="none" />
          <line x1="19" y1="4" x2="19" y2="20" />
          <circle cx="19" cy="7" r="2" fill="currentColor" stroke="none" />
        </svg>
      </button>
    </div>
  </header>

  <p id="selection-hint" class="selection-hint" aria-live="polite"></p>

  <main id="chat" class="chat" role="log" aria-live="polite"></main>

  <div id="control-overlay" class="control-overlay hidden">
    <div class="control-panel" role="dialog" aria-modal="true" data-i18n-aria="control_title">
      <div class="control-panel-header">
        <h2 data-i18n="control_title">בקרה ומצב המערכת</h2>
        <button type="button" id="control-close" class="icon-btn" data-i18n-aria="control_close">✕</button>
      </div>
      <div id="control-body" class="control-body">
        <p data-i18n="control_loading">טוען...</p>
      </div>
    </div>
  </div>

  <form id="composer" class="composer" data-i18n-aria="composer_aria">
    <label for="message" class="visually-hidden" data-i18n="message_label">הודעה</label>
    <textarea
      id="message"
      class="message-input"
      data-i18n-placeholder="message_placeholder"
      placeholder="כתבו הודעה..."
      rows="1"
      autofocus
    ></textarea>
    <button type="submit" class="send-btn" data-i18n-aria="send_aria">➤</button>
  </form>

  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
